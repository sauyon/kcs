name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binaries
        run: make build-all

      - name: Checksums
        run: cd bin && sha256sum kcs-* > checksums.txt

      - name: Create release
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            bin/kcs-darwin-amd64 \
            bin/kcs-darwin-arm64 \
            bin/kcs-linux-amd64 \
            bin/kcs-linux-arm64 \
            bin/checksums.txt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
